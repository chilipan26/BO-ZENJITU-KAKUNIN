<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>出発監視（BO）</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  :root{
    --bg:#f4f5f7; --card:#ffffff; --line:#e3e5ea;
    --txt:#1d1f24; --sub:#6b7079; --accent:#4361EE;
    --ok-bg:#e7f4ea; --ok-tx:#1e7a3c;
    --warn-bg:#fdecea; --warn-tx:#b3271e;
    --wait-bg:#eef0f3; --wait-tx:#5a6069;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
    line-height:1.45;padding:10px 9px 24px;}
  .head{display:flex;align-items:center;justify-content:space-between;margin:0 2px 6px;}
  .head h1{font-size:18px;font-weight:700;margin:0;}
  .refresh{border:none;background:var(--accent);color:#fff;font-size:13px;font-weight:600;
    padding:6px 12px;border-radius:18px;}
  .updated{font-size:11px;color:var(--sub);margin:0 2px 8px;}
  .tabs{display:flex;gap:6px;margin:0 0 10px;}
  .tab{flex:1;text-align:center;font-size:14px;font-weight:700;padding:8px 4px;border-radius:10px;
    background:var(--card);border:1px solid var(--line);color:var(--sub);}
  .tab.on{background:var(--accent);border-color:var(--accent);color:#fff;}
  .summary{display:flex;gap:6px;margin:0 0 10px;}
  .chip{flex:1;text-align:center;border-radius:10px;padding:6px 4px;}
  .chip .n{font-size:20px;font-weight:700;display:inline;margin-right:4px;}
  .chip .l{font-size:12px;}
  .chip.warn{background:var(--warn-bg);color:var(--warn-tx);}
  .chip.wait{background:var(--wait-bg);color:var(--wait-tx);}
  .chip.ok{background:var(--ok-bg);color:var(--ok-tx);}
  .card{background:var(--card);border:1px solid var(--line);border-radius:11px;
    padding:8px 11px;margin-bottom:6px;}
  .card.alert{border-color:#f3b6b0;background:#fffafa;}
  .top{display:flex;align-items:center;gap:7px;margin-bottom:6px;}
  .pill{font-size:12px;font-weight:700;padding:2px 9px;border-radius:16px;white-space:nowrap;}
  .pill.ok{background:var(--ok-bg);color:var(--ok-tx);}
  .pill.warn{background:var(--warn-bg);color:var(--warn-tx);}
  .pill.wait{background:var(--wait-bg);color:var(--wait-tx);}
  .nm{font-size:16px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .ev{font-size:13px;color:var(--sub);max-width:42%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .meet{font-size:12px;color:var(--sub);white-space:nowrap;}
  .meet b{font-size:17px;font-weight:700;color:var(--txt);margin-left:2px;}
  .row3{display:grid;grid-template-columns:1fr 0.7fr 1fr 1fr;gap:2px 8px;font-size:14px;}
  .row3 .cell{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .row3 .lb{display:block;color:var(--sub);font-size:11px;line-height:1.3;}
  .row3 .vl{font-weight:700;}
  .limit{margin-top:7px;background:var(--warn-bg);color:var(--warn-tx);border-radius:8px;
    padding:5px 10px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .limit span{font-size:12px;font-weight:600;}
  .limit b{font-size:17px;font-weight:700;}
  .state{padding:40px 16px;text-align:center;color:var(--sub);font-size:16px;}
  .err{color:var(--warn-tx);}
</style>
</head>
<body>

<div class="head">
  <h1 id="title">出発状況</h1>
  <button class="refresh" id="btn" onclick="reload()">更新</button>
</div>
<div class="updated" id="updated"></div>
<div class="tabs">
  <div class="tab on" id="tabToday" onclick="switchDay('today')">本日</div>
  <div class="tab" id="tabTomorrow" onclick="switchDay('tomorrow')">明日</div>
</div>
<div id="summary"></div>
<div id="app"><div class="state">読み込み中…</div></div>

<script>
  // ▼▼▼ ここだけ差し替え ▼▼▼
  var LIFF_ID = "2010513438-agAX3Stv";   // ← BO管理LIFFのLIFF ID（中西さん用の公式LINE）
  var GAS_URL = "https://script.google.com/macros/s/AKfycby526aLBiPtUEuNll856wQvCI_GTnjlZO8RU8n4ffM7Q7vffa3T8hT0xrWYlAmbKNF1WQ/exec";
  // ▲▲▲ ここまで ▲▲▲

  var app = document.getElementById("app");
  var ALERT = "🚨 要確認", WAIT = "⏳ 未出発", OK = "👍 出発済";

  function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}

  function pillClass(disp){
    if(disp.indexOf("出発済")>=0) return "ok";
    if(disp.indexOf("要確認")>=0) return "warn";
    return "wait";
  }

  function rowHTML(lb,val){
    if(!val) return "";
    return '<div><span class="lb">'+lb+'</span><span class="vl">'+esc(val)+'</span></div>';
  }

  function cardHTML(r){
    var isAlert = r.dispStatus.indexOf("要確認") >= 0;

    // 上段右：現場のみ（集合は2行目の最右へ）
    var ev = r.event ? '<span class="ev">'+esc(r.event)+'</span>' : '';

    // 🚃/🚗 + 時刻（移動区分はアイコンで表現）
    var moveIcon = "", moveTime = r.transportTime || "";
    if (r.transport.indexOf("電車") >= 0)      moveIcon = "🚃";
    else if (r.transport.indexOf("ピック") >= 0) moveIcon = "🚗";
    var moveCell = '<div class="cell"><span class="lb">'
      + (moveIcon || "移動") + '</span><span class="vl">'
      + (moveTime ? esc(moveTime) : (moveIcon ? "—" : esc(r.transport||"-"))) + '</span></div>';

    // 2行目：自宅出発 / 🚃🚗 / 到着予定 / 集合（4カラム）
    var row3 = '<div class="row3">'
      + '<div class="cell"><span class="lb">自宅出発</span><span class="vl">'+esc(r.departTime||"-")+'</span></div>'
      + moveCell
      + '<div class="cell"><span class="lb">到着予定</span><span class="vl">'+esc(r.arriveTime||"-")+'</span></div>'
      + '<div class="cell"><span class="lb">集合</span><span class="vl">'+esc(r.meetTime||"-")+'</span></div>'
      + '</div>';

    // 3行目：要確認のときだけ最終出発リミット
    var limit = (isAlert && r.lastLimit)
      ? '<div class="limit"><span>⚠️ 最終出発リミット</span><b>'+esc(r.lastLimit)+'</b></div>' : '';

    return '<div class="card'+(isAlert?' alert':'')+'">'
      + '<div class="top">'
      +   '<span class="pill '+pillClass(r.dispStatus)+'">'+esc(r.dispStatus)+'</span>'
      +   '<span class="nm">'+esc(r.name||"（担当者未設定）")+'</span>'
      +   ev
      + '</div>'
      + row3
      + limit
      + '</div>';
  }

  function summaryHTML(recs){
    var a=0,w=0,o=0;
    recs.forEach(function(r){
      if(r.dispStatus.indexOf("要確認")>=0) a++;
      else if(r.dispStatus.indexOf("出発済")>=0) o++;
      else w++;
    });
    return '<div class="summary">'
      + '<div class="chip warn"><span class="n">'+a+'</span><span class="l">要確認</span></div>'
      + '<div class="chip wait"><span class="n">'+w+'</span><span class="l">未出発</span></div>'
      + '<div class="chip ok"><span class="n">'+o+'</span><span class="l">出発済</span></div>'
      + '</div>';
  }

  function render(data){
    var t = data.date || data.today || "";
    var m = t.match(/^\d{4}-(\d{2})-(\d{2})$/);
    var mmdd = m ? (Number(m[1])+"月"+Number(m[2])+"日") : "";
    var dayWord = (CURRENT_DAY === 'tomorrow') ? "明日" : "本日";
    document.getElementById("title").textContent = (mmdd?mmdd+" ":"") + "出発状況";

    var now = new Date();
    var pad = function(n){return ('0'+n).slice(-2);};
    document.getElementById("updated").textContent =
      "更新 " + pad(now.getHours()) + ":" + pad(now.getMinutes());

    var recs = data.records || [];
    document.getElementById("summary").innerHTML = recs.length ? summaryHTML(recs) : "";
    if(recs.length === 0){
      app.innerHTML = '<div class="state">'+dayWord+'の予定はまだありません。</div>';
      return;
    }
    app.innerHTML = recs.map(cardHTML).join("");
  }

  var CURRENT_DAY = 'today';

  function switchDay(which){
    if(CURRENT_DAY === which) return;
    CURRENT_DAY = which;
    document.getElementById('tabToday').className    = 'tab' + (which==='today'    ? ' on' : '');
    document.getElementById('tabTomorrow').className = 'tab' + (which==='tomorrow' ? ' on' : '');
    app.innerHTML = '<div class="state">読み込み中…</div>';
    document.getElementById('summary').innerHTML = '';
    reload();
  }

  function reload(){
    var btn = document.getElementById("btn");
    btn.textContent = "更新中…"; btn.disabled = true;
    fetch(GAS_URL + "?mode=admin&date=" + CURRENT_DAY, { method:"GET", redirect:"follow" })
      .then(function(res){ return res.json(); })
      .then(function(data){
        if(data.status !== "ok"){
          app.innerHTML = '<div class="state err">読み込みエラー：'+esc(data.message||"")+'</div>';
        } else { render(data); }
      })
      .catch(function(e){
        app.innerHTML = '<div class="state err">通信エラー。電波の良い場所で更新してください。</div>';
      })
      .then(function(){ btn.textContent = "更新"; btn.disabled = false; });
  }

  // 60秒ごとに自動更新（監視用）
  setInterval(reload, 60000);

  liff.init({ liffId: LIFF_ID })
    .then(function(){
      if(!liff.isLoggedIn()){ liff.login(); return; }
      reload();
    })
    .catch(function(e){
      // LIFF外（ブラウザ直開き）でも一応データは出す
      reload();
    });
</script>
</body>
</html>
